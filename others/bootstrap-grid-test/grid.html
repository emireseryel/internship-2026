<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body style="background-color: blanchedalmond">
    <div class="container-fluid mb-3 px-5">
      <div class="row g-4">
        <div class="col-8">
          <div class="bg-warning text-center py-5 h-100">I am a div</div>
        </div>
    
        <div class="col-4">
          <div class="bg-success text-center py-5 h-100"></div>
        </div>
      </div>

      
      <div class="row mt-5">
        <div class="col-12 bg-danger text-center py-3 px-0">
          <p class="text-primary fw-bold h5 mb-3">Div yapıları ve gösterimler</p>
          <div class="d-grid gap-2">
            <button class="btn btn-primary" type="button">
              Block level button
            </button>
            <button class="btn btn-secondary" type="button">
              Block level button
            </button>
          </div>
        </div>
      </div>

      
      <div class="row mt-4">
        <div class="col-12">
          <img src="img/myimage.jpg" class="img-fluid w-100" alt="View" style="max-height: 300px; object-fit: cover;"/>
        </div>
      </div>
  </body>
</html>
