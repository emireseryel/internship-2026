<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow p-4" style="width: 100%; max-width: 400px">
            <form method="post" action="database.php">
                <div class="mb-3">
                    <label class="form-label">İsim: </label>
                    <input type="text" name="name" class="form-control" placeholder="Ahmet Yıldız">
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail: </label>
                    <input type="email" name="email" class="form-control" placeholder="örnek@site.com">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Cinsiyet:</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="erkek" value="erkek" required>
                        <label class="form-check-label" for="erkek">Erkek</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="kadin" value="kadin">
                        <label class="form-check-label" for="kadin">Kadın</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Şifre: </label>
                    <input type="password" name="password" class="form-control" placeholder="Şifre">
                </div>

                <div class="mb-3">
                    <input type="submit" name="submit" class="btn btn-primary w-100" value="Kayıt ol">
                </div>

            </form>
        </div>
    </div>

</body>

</html>
